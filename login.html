<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart ECG Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        body {
            background: radial-gradient(circle at top left, #0f172a, #020617);
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6" x-data="loginHandler()">

    <div class="login-card p-12 rounded-[3.5rem] w-full max-w-md shadow-2xl border-t-[12px] border-blue-600 text-center">
        <div class="mb-6 inline-block px-4 py-1.5 bg-blue-100 text-blue-700 font-black tracking-widest text-[10px] uppercase rounded-full">
            Admin Access v6.0
        </div>

        <h2 class="text-5xl font-black text-slate-800 uppercase italic tracking-tighter mb-2">
            SMART <span class="text-blue-600">ECG</span>
        </h2>
        <p class="text-slate-400 font-bold text-[10px] tracking-[0.4em] uppercase mb-12">
            Informatics Engineering Portal
        </p>
        
        <div class="space-y-5">
            <input type="text" x-model="username" placeholder="Admin ID" 
                   class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl outline-none focus:border-blue-600 transition text-lg font-bold text-slate-700 shadow-inner">
            
            <input type="password" x-model="password" placeholder="Password" 
                   class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl outline-none focus:border-blue-600 transition text-lg font-bold text-slate-700 shadow-inner">

            <button @click="doLogin()" 
                    class="w-full bg-blue-600 text-white py-5 rounded-3xl font-black text-xl shadow-xl hover:bg-blue-700 active:scale-95 transition-all mt-4 uppercase tracking-widest">
                Authorize
            </button>
        </div>

        <div class="mt-10">
            <a href="index.html" class="text-slate-400 hover:text-slate-600 font-bold text-xs uppercase tracking-widest transition">
                ← Kembali ke Beranda
            </a>
        </div>
    </div>

    <script>
        function loginHandler() {
            return {
                username: '',
                password: '',
                doLogin() {
                    if (this.username === 'admin1' && this.password === 'pnj2026') {
                        // Jika sukses, arahkan ke dashboard.html
                        window.location.href = 'dashboard.html';
                    } else {
                        alert('Akses Ditolak! ID atau Password salah.');
                        this.password = '';
                    }
                }
            }
        }
    </script>
</body>
</html>

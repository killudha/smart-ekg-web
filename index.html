<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECG Monitor - Final Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite@0.0.1-alpha.9/dist/tf-tflite.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-blue-50 font-sans" x-data="{ 
    isLoggedIn: false, 
    menu: 'monitoring',
    bpm: 0, 
    aiResult: 'Menunggu...',
    tfliteModel: null,

    initFirebase() {
        // --- MASUKKAN CONFIG FIREBASE KAMU DI SINI ---
        const firebaseConfig = {
            apiKey: 'AIzaSy...',
            authDomain: 'projek-ekg.firebaseapp.com',
            databaseURL: 'https://projek-ekg-default-rtdb.firebaseio.com',
            projectId: 'projek-ekg',
            storageBucket: 'projek-ekg.appspot.com',
            messagingSenderId: '...',
            appId: '...'
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        // PERHATIKAN PATH INI: Jika di Firebase namanya 'bpm' (kecil), ganti jadi 'bpm'
        // Jika di dalam folder 'sensor', pakai 'sensor/bpm'
        const bpmRef = firebase.database().ref('BPM'); 
        
        bpmRef.on('value', (snapshot) => {
            const val = snapshot.val();
            console.log('Data masuk dari Firebase:', val);
            if (val !== null) {
                this.bpm = parseInt(val);
            }
        }, (error) => {
            console.error('Firebase Error:', error);
        });
    },

    async loadModel() {
        this.aiResult = 'Loading AI...';
        try {
            // Fix Path untuk TFLite di GitHub/Netlify
            this.tfliteModel = await tflite.loadTFLiteModel('model_ekg_hybrid.tflite');
            this.aiResult = 'Model Ready';
            console.log('TFLite Model Berhasil Dimuat');
        } catch (e) {
            this.aiResult = 'Model Gagal';
            console.error('TFLite Error:', e);
        }
    },

    async runInference(inputData) {
        if (!this.tfliteModel) return;
        try {
            const inputTensor = tf.tensor(inputData, [1, 375, 1], 'float32');
            const output = this.tfliteModel.predict(inputTensor);
            const predictions = await output.data();
            const labels = ['NORMAL', 'TAKIKARDIA', 'BRADIKARDIA', 'ARITMIA', 'UNKNOWN'];
            const maxIdx = predictions.indexOf(Math.max(...predictions));
            this.aiResult = labels[maxIdx];
            inputTensor.dispose();
        } catch (err) { console.error('Inference Error:', err); }
    },

    initChart() {
        this.$nextTick(() => {
            const ctx = document.getElementById('ecgChart').getContext('2d');
            let buffer = Array.from({length: 375}, () => 0);
            let time = 0;

            const myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: 100}, (_, i) => i),
                    datasets: [{
                        data: Array.from({length: 100}, () => 0),
                        borderColor: '#2563eb',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: false
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, animation: false,
                    scales: { y: { min: -0.5, max: 2.5 }, x: { display: false } }
                }
            });

            setInterval(() => {
                if(this.isLoggedIn && this.menu === 'monitoring') {
                    // Grafik bergerak hanya jika BPM > 0
                    let speed = (this.bpm > 0 ? this.bpm : 60) / 4000;
                    time += speed;
                    
                    // Rumus simulasi gelombang EKG
                    let val = (0.15 * Math.exp(-Math.pow((time % 1) - 0.2, 2) / 0.002)) + 
                              (1.8 * Math.exp(-Math.pow((time % 1) - 0.4, 2) / 0.0001)) + 
                              (0.25 * Math.exp(-Math.pow((time % 1) - 0.7, 2) / 0.005));
                    
                    myChart.data.datasets[0].data.shift();
                    myChart.data.datasets[0].data.push(val);
                    myChart.update('none');
                    buffer.shift(); buffer.push(val);
                }
            }, 30);

            // Prediksi setiap 1.5 detik
            setInterval(() => {
                if(this.isLoggedIn && this.tfliteModel) this.runInference(buffer);
            }, 1500);
        });
    }
}">
    
    <template x-if="!isLoggedIn">
        <div class="min-h-screen flex items-center justify-center bg-slate-900">
            <button @click="isLoggedIn=true; initFirebase(); loadModel(); initChart();" class="bg-blue-600 px-10 py-5 rounded-2xl text-white font-black shadow-2xl hover:scale-105 transition">ENTER DASHBOARD</button>
        </div>
    </template>

    <template x-if="isLoggedIn">
        <div class="flex min-h-screen">
            <aside class="w-64 bg-slate-900 text-white p-8 shadow-2xl">
                <h1 class="text-xl font-black text-blue-500 mb-10 tracking-tighter italic">SMART_ECG</h1>
                <nav class="space-y-4 font-bold text-sm">
                    <button @click="menu='monitoring'" :class="menu==='monitoring' ? 'text-white' : 'text-slate-500'">📡 MONITORING</button>
                </nav>
            </aside>
            <main class="flex-1 p-10">
                <div class="bg-white p-10 rounded-[3rem] shadow-xl border">
                    <div class="h-64 mb-10 border rounded-2xl overflow-hidden">
                        <canvas id="ecgChart"></canvas>
                    </div>
                    <div class="grid grid-cols-2 gap-10">
                        <div class="bg-blue-600 p-8 rounded-3xl text-white">
                            <p class="text-xs font-bold opacity-50 uppercase mb-1">Firebase BPM</p>
                            <p class="text-6xl font-black" x-text="bpm"></p>
                        </div>
                        <div class="bg-white border-4 border-blue-600 p-8 rounded-3xl">
                            <p class="text-xs font-bold text-slate-400 uppercase mb-1">Pure AI Result</p>
                            <p class="text-4xl font-black text-blue-600 uppercase" x-text="aiResult"></p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </template>
</body>
</html>

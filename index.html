<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart ECG Dashboard - Pure AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite@0.0.1-alpha.9/dist/tf-tflite.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-blue-50 font-sans" x-data="{ 
    isLoggedIn: false, 
    menu: 'monitoring',
    username: '',
    password: '',
    bpm: 0, 
    aiResult: 'Inisialisasi...',
    tfliteModel: null,

    initFirebase() {
        // KONFIGURASI FIREBASE SESUAI REQUEST KAMU
        const firebaseConfig = {
            apiKey: 'AIzaSyD7cegeyQVu5d0cRkv1dyAjzXWOz8gE-HM',
            authDomain: 'smart-ekg-tmj-6b.firebaseapp.com',
            databaseURL: 'https://smart-ekg-tmj-6b-default-rtdb.asia-southeast1.firebasedatabase.app',
            projectId: 'smart-ekg-tmj-6b',
            storageBucket: 'smart-ekg-tmj-6b.firebasestorage.app',
            messagingSenderId: '257827223094',
            appId: '1:257827223094:web:e3d4d834e17a77ffcf4a97',
            measurementId: 'G-G45LY3KNGH'
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        // Ambil data dari node 'BPM' (Pastikan di Firebase tulisannya BPM besar)
        firebase.database().ref('BPM').on('value', (snapshot) => {
            const val = snapshot.val();
            if (val !== null) {
                this.bpm = parseInt(val);
                console.log('Firebase BPM Sync:', this.bpm);
            }
        });
    },

    async loadModel() {
        this.aiResult = 'Memuat Model...';
        try {
            // Set WASM path agar TFJS tidak gagal load di Netlify
            tflite.setWasmPath('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite@0.0.1-alpha.9/dist/');
            this.tfliteModel = await tflite.loadTFLiteModel('model_ekg_hybrid.tflite');
            this.aiResult = 'Model Aktif';
        } catch (e) {
            this.aiResult = 'Model Gagal';
            console.error('TFLite Error:', e);
        }
    },

    async runInference(buffer) {
        if (!this.tfliteModel) return;
        try {
            const inputTensor = tf.tensor(buffer, [1, 375, 1], 'float32');
            const output = this.tfliteModel.predict(inputTensor);
            const predictions = await output.data();
            
            const labels = ['NORMAL', 'TAKIKARDIA', 'BRADIKARDIA', 'ARITMIA', 'UNKNOWN'];
            const maxIdx = predictions.indexOf(Math.max(...predictions));
            this.aiResult = labels[maxIdx];
            
            inputTensor.dispose();
        } catch (err) { console.error('Inference Error:', err); }
    },

    generateECGPoint(t) {
        let p = t % 1.0;
        let v = 0;
        v += 0.15 * Math.exp(-Math.pow(p - 0.2, 2) / 0.002); // P Wave
        v -= 0.15 * Math.exp(-Math.pow(p - 0.38, 2) / 0.0001); // Q
        v += 1.8 * Math.exp(-Math.pow(p - 0.4, 2) / 0.0001); // R Peak
        v -= 0.25 * Math.exp(-Math.pow(p - 0.42, 2) / 0.0001); // S
        v += 0.3 * Math.exp(-Math.pow(p - 0.7, 2) / 0.005); // T Wave
        return v + (Math.random() * 0.05);
    },

    initChart() {
        this.$nextTick(() => {
            const ctx = document.getElementById('ecgChart').getContext('2d');
            if (window.myChart) window.myChart.destroy();
            let buffer = Array.from({length: 375}, () => 0);
            let time = 0;

            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: 100}, (_, i) => i),
                    datasets: [{
                        data: Array.from({length: 100}, () => 0),
                        borderColor: '#2563eb',
                        borderWidth: 3,
                        pointRadius: 0,
                        tension: 0.3,
                        fill: true,
                        backgroundColor: 'rgba(37, 99, 235, 0.05)'
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, animation: false,
                    scales: { y: { min: -0.5, max: 2.5 }, x: { display: false } },
                    plugins: { legend: { display: false } }
                }
            });

            setInterval(() => {
                if(this.menu === 'monitoring' && this.isLoggedIn) {
                    // Kecepatan grafik otomatis mengikuti BPM Firebase
                    let speed = (this.bpm > 0 ? this.bpm : 60) / 4500;
                    time += speed;
                    let val = this.generateECGPoint(time);
                    
                    window.myChart.data.datasets[0].data.shift();
                    window.myChart.data.datasets[0].data.push(val);
                    window.myChart.update('none');

                    buffer.shift();
                    buffer.push(val);
                }
            }, 30);

            // Jalankan AI Murni TFLite setiap 1.5 detik
            setInterval(() => {
                if(this.isLoggedIn && this.tfliteModel && this.menu === 'monitoring') {
                    this.runInference(buffer);
                }
            }, 1500);
        });
    }
}">

    <template x-if="!isLoggedIn">
        <div class="min-h-screen flex items-center justify-center bg-slate-900 px-4">
            <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-md border-t-[12px] border-blue-600">
                <div class="text-center mb-10">
                    <h2 class="text-3xl font-black text-slate-800 uppercase italic tracking-tighter">Smart ECG</h2>
                    <p class="text-slate-400 font-bold text-[10px] tracking-widest mt-1">REALTIME DASHBOARD</p>
                </div>
                <div class="space-y-4">
                    <input type="text" x-model="username" placeholder="Admin ID" class="w-full p-4 bg-slate-50 border-2 rounded-2xl outline-none focus:border-blue-500 transition">
                    <input type="password" x-model="password" placeholder="Password" class="w-full p-4 bg-slate-50 border-2 rounded-2xl outline-none focus:border-blue-500 transition">
                    <button @click="if(username==='admin1' && password==='pnj2026'){isLoggedIn=true; initFirebase(); loadModel(); initChart();} else {alert('Login Gagal!')}" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-xl hover:bg-blue-700 transition active:scale-95">LOGIN</button>
                </div>
            </div>
        </div>
    </template>

    <template x-if="isLoggedIn">
        <div class="flex min-h-screen">
            <aside class="w-72 bg-slate-900 text-white flex flex-col p-8 shadow-2xl">
                <div class="mb-12">
                    <h1 class="text-2xl font-black italic">ADMIN<span class="text-blue-500">_ECG</span></h1>
                    <div class="h-1 w-12 bg-blue-600 mt-2"></div>
                </div>
                <nav class="flex-1 space-y-4 font-bold text-sm">
                    <button @click="menu='monitoring'; initChart()" :class="menu==='monitoring' ? 'text-blue-500' : 'text-slate-500'">📡 MONITORING</button>
                    <button @click="menu='team'" :class="menu==='team' ? 'text-blue-500' : 'text-slate-500'">👥 TEAM</button>
                </nav>
                <button @click="isLoggedIn=false" class="py-3 text-red-500 font-black border-2 border-red-900/30 rounded-2xl text-xs">LOGOUT</button>
            </aside>

            <main class="flex-1 p-12 bg-white overflow-y-auto">
                <div x-show="menu === 'monitoring'" x-transition>
                    <div class="flex justify-between items-end mb-10">
                        <h2 class="text-4xl font-black text-slate-800 tracking-tighter uppercase italic">Live Monitoring</h2>
                        <span class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-[10px] font-black uppercase">Pure TFLite Inference</span>
                    </div>

                    <div class="bg-slate-50 p-10 rounded-[3.5rem] border border-slate-100 shadow-sm">
                        <div class="h-80 bg-white rounded-[2.5rem] mb-10 relative overflow-hidden border-2 shadow-inner">
                            <div class="absolute inset-0 opacity-[0.04]" style="background-image: linear-gradient(#000 1px, transparent 1px), linear-gradient(90deg, #000 1px, transparent 1px); background-size: 25px 25px;"></div>
                            <canvas id="ecgChart" class="relative z-10"></canvas>
                        </div>
                        <div class="grid grid-cols-2 gap-10">
                            <div class="p-10 bg-blue-600 rounded-[3rem] text-white shadow-2xl shadow-blue-100">
                                <p class="text-[10px] font-black uppercase tracking-widest opacity-60 mb-2">Realtime BPM (Firebase)</p>
                                <p class="text-7xl font-black" x-text="bpm + ' BPM'"></p>
                            </div>
                            <div class="p-10 bg-white border-[6px] rounded-[3rem] text-center transition-all duration-500"
                                :class="{
                                    'border-blue-600': aiResult === 'NORMAL',
                                    'border-red-500 animate-pulse': aiResult === 'TAKIKARDIA' || aiResult === 'ARITMIA',
                                    'border-yellow-500': aiResult === 'BRADIKARDIA',
                                    'border-slate-300': aiResult.includes('...')
                                }">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Pure TFLite Result</p>
                                <p class="text-5xl font-black uppercase"
                                    :class="{
                                        'text-blue-600': aiResult === 'NORMAL',
                                        'text-red-500': aiResult === 'TAKIKARDIA' || aiResult === 'ARITMIA',
                                        'text-yellow-500': aiResult === 'BRADIKARDIA'
                                    }"
                                    x-text="aiResult"></p>
                            </div>
                        </div>
                    </div>
                </div>

                <div x-show="menu === 'team'" x-transition>
                    <h2 class="text-3xl font-black text-slate-800 mb-10 text-center uppercase italic">Development Team</h2>
                    <div class="grid grid-cols-2 gap-6 max-w-4xl mx-auto">
                        <div class="bg-white p-8 rounded-3xl border shadow text-center group hover:border-blue-500 transition">
                            <p class="text-xl font-black text-slate-800 italic">Maqrefa Akbar</p><p class="text-blue-500 font-mono font-bold mt-2">2307421037</p>
                        </div>
                        <div class="bg-white p-8 rounded-3xl border shadow text-center group hover:border-blue-500 transition">
                            <p class="text-xl font-black text-slate-800 italic">Ghea Geltra Ambarwinoto</p><p class="text-blue-500 font-mono font-bold mt-2">2307421038</p>
                        </div>
                        <div class="bg-white p-8 rounded-3xl border shadow text-center group hover:border-blue-500 transition">
                            <p class="text-xl font-black text-slate-800 italic">Naora Adhani</p><p class="text-blue-500 font-mono font-bold mt-2">2307421041</p>
                        </div>
                        <div class="bg-white p-8 rounded-3xl border shadow text-center group hover:border-blue-500 transition">
                            <p class="text-xl font-black text-slate-800 italic">Shanazsiva Nasra</p><p class="text-blue-500 font-mono font-bold mt-2">2307421044</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </template>
</body>
</html>

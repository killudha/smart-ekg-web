<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart ECG Dashboard - Pure TFLite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite/dist/tf-tflite.min.js"></script>
</head>
<body class="bg-blue-50 font-sans" x-data="{ 
    isLoggedIn: false, 
    menu: 'monitoring',
    username: '',
    password: '',
    bpm: 75,
    aiResult: 'Memuat Model...',
    tfliteModel: null,

    // Fungsi load model TFLite
    async loadModel() {
        try {
            this.tfliteModel = await tflite.loadTFLiteModel('./model_ekg_hybrid.tflite');
            this.aiResult = 'Model Siap';
            console.log('Model TFLite Berhasil Dimuat');
        } catch (e) {
            this.aiResult = 'Gagal Load Model';
            console.error(e);
        }
    },

    // Prediksi Murni dari Model (No Manual Logic)
    async runInference(inputData) {
        if (!this.tfliteModel) return;

        // Siapkan tensor sesuai input model (1, 375, 1)
        const input = tf.tensor(inputData, [1, 375, 1], 'float32');
        const output = this.tfliteModel.predict(input);
        const predictions = await output.data();
        
        // Ambil index dengan probabilitas tertinggi
        const maxIndex = predictions.indexOf(Math.max(...predictions));
        
        // Mapping hasil berdasarkan label di Python
        const labels = ['NORMAL', 'TAKIKARDIA', 'BRADIKARDIA', 'ARITMIA', 'UNKNOWN'];
        this.aiResult = labels[maxIndex];

        // Cleanup memory
        input.dispose();
        output.dispose();
    },

    generateECGPoint(t) {
        let phase = t % 1.0;
        let val = 0;
        val += 0.12 * Math.exp(-Math.pow(phase - 0.2, 2) / 0.002);
        val -= 0.15 * Math.exp(-Math.pow(phase - 0.38, 2) / 0.0001);
        val += 1.8 * Math.exp(-Math.pow(phase - 0.4, 2) / 0.0001);
        val -= 0.25 * Math.exp(-Math.pow(phase - 0.42, 2) / 0.0001);
        val += 0.25 * Math.exp(-Math.pow(phase - 0.7, 2) / 0.005);
        return val + (Math.random() * 0.02);
    },

    initChart() {
        this.$nextTick(() => {
            const ctx = document.getElementById('ecgChart').getContext('2d');
            if (window.myChart) window.myChart.destroy();
            
            let time = 0;
            let bufferData = Array.from({length: 375}, () => 0); // Buffer untuk input AI

            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: 100}, (_, i) => i),
                    datasets: [{
                        data: Array.from({length: 100}, () => 0),
                        borderColor: '#2563eb',
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0.2,
                        fill: false
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, animation: false,
                    scales: { y: { min: -0.5, max: 2.5 }, x: { display: false } },
                    plugins: { legend: { display: false } }
                }
            });

            setInterval(async () => {
                if(this.menu === 'monitoring' && this.isLoggedIn) {
                    let freq = this.bpm / 60;
                    time += 0.01 * freq;
                    let nextPoint = this.generateECGPoint(time);
                    
                    window.myChart.data.datasets[0].data.shift();
                    window.myChart.data.datasets[0].data.push(nextPoint);
                    window.myChart.update('none');

                    // Masukkan ke buffer AI
                    bufferData.shift();
                    bufferData.push(nextPoint);
                }
            }, 30);

            // Jalankan Inferensi setiap 1 detik
            setInterval(() => {
                if(this.isLoggedIn && this.menu === 'monitoring') {
                    this.runInference(bufferData);
                }
            }, 1000);
        });
    }
}">

    <template x-if="!isLoggedIn">
        <div class="min-h-screen flex items-center justify-center bg-blue-900">
            <div class="bg-white p-10 rounded-3xl shadow-2xl w-96">
                <h2 class="text-2xl font-black text-center mb-6 text-blue-900 uppercase">Smart ECG Pure AI</h2>
                <div class="space-y-4">
                    <input type="text" x-model="username" placeholder="Admin" class="w-full p-4 border rounded-xl outline-none">
                    <input type="password" x-model="password" placeholder="Password" class="w-full p-4 border rounded-xl outline-none">
                    <button @click="if(username==='admin1' && password==='pnj2026'){isLoggedIn=true; loadModel(); initChart();} else {alert('Gagal!')}" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">LOGIN</button>
                </div>
            </div>
        </div>
    </template>

    <template x-if="isLoggedIn">
        <div class="flex min-h-screen">
            <aside class="w-64 bg-slate-900 text-white flex flex-col p-6 shadow-2xl">
                <div class="mb-10 text-center text-blue-500 font-black text-xl">DASHBOARD</div>
                <nav class="flex-1 space-y-4">
                    <button @click="menu='monitoring'" :class="menu==='monitoring' ? 'text-blue-400' : ''">📡 Monitoring</button>
                    <button @click="menu='team'" :class="menu==='team' ? 'text-blue-400' : ''">👥 Team</button>
                </nav>
                <button @click="isLoggedIn=false" class="text-red-400 font-bold">LOGOUT</button>
            </aside>

            <main class="flex-1 p-10 bg-white">
                <div x-show="menu === 'monitoring'">
                    <h2 class="text-2xl font-black mb-6">Real-Time AI Classification</h2>
                    <div class="bg-slate-50 p-8 rounded-[2rem] border">
                        <div class="h-64 bg-white rounded-2xl mb-8 border relative">
                            <canvas id="ecgChart"></canvas>
                        </div>
                        <div class="grid grid-cols-2 gap-8">
                            <div class="p-8 bg-blue-600 rounded-3xl text-white shadow-xl text-center">
                                <p class="text-xs font-black opacity-60 mb-2 uppercase">Input BPM</p>
                                <p class="text-5xl font-black" x-text="bpm"></p>
                            </div>
                            <div class="p-8 bg-white border-4 border-blue-600 rounded-3xl text-center">
                                <p class="text-xs font-black text-slate-400 mb-2 uppercase">AI Prediction (Murni TFLite)</p>
                                <p class="text-3xl font-black text-blue-600" x-text="aiResult"></p>
                            </div>
                        </div>
                    </div>
                </div>

                <div x-show="menu === 'team'">
                    <h2 class="text-2xl font-black mb-8 text-center">Development Team</h2>
                    <div class="grid grid-cols-2 gap-4 max-w-2xl mx-auto text-center font-bold">
                        <div class="bg-white p-6 rounded-2xl border">Maqrefa Akbar<br><span class="text-blue-500">2307421037</span></div>
                        <div class="bg-white p-6 rounded-2xl border">Ghea Geltra Ambarwinoto<br><span class="text-blue-500">2307421038</span></div>
                        <div class="bg-white p-6 rounded-2xl border">Naora Adhani<br><span class="text-blue-500">2307421041</span></div>
                        <div class="bg-white p-6 rounded-2xl border">Shanazsiva Nasra<br><span class="text-blue-500">2307421044</span></div>
                    </div>
                </div>
            </main>
        </div>
    </template>
</body>
</html>

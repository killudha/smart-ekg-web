<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Login - Smart ECG Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-grid {
            background-image: radial-gradient(rgba(59, 130, 246, 0.2) 1px, transparent 1px);
            background-size: 30px 30px;
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center relative overflow-hidden" x-data="loginSystem()">

    <div class="absolute inset-0 bg-grid z-0"></div>
    <div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-blue-600/20 blur-[120px] rounded-full z-0"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-emerald-600/20 blur-[120px] rounded-full z-0"></div>

    <div class="bg-white p-12 rounded-[4rem] shadow-[0_0_60px_rgba(37,99,235,0.2)] w-full max-w-md border-t-[16px] border-blue-600 text-center relative z-10 transform transition-all">
        
        <div class="inline-block px-4 py-1.5 bg-blue-100 text-blue-700 font-black tracking-widest text-[10px] uppercase rounded-full mb-6">
            Admin Portal v5.5
        </div>

        <h2 class="text-5xl font-black text-slate-800 uppercase italic tracking-tighter mb-2">
            SMART <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-emerald-500">ECG</span>
        </h2>
        
        <p class="text-slate-400 font-bold text-xs tracking-widest uppercase mb-10">
            IoT & Machine Learning Integration
        </p>
        
        <div class="space-y-5">
            <div class="text-left">
                <input type="text" x-model="username" placeholder="Admin ID" @keydown.enter="login()"
                       class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl outline-none focus:border-blue-600 transition text-lg shadow-inner text-slate-800 font-bold placeholder-slate-300">
            </div>
            
            <div class="text-left">
                <input type="password" x-model="password" placeholder="Password" @keydown.enter="login()"
                       class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl outline-none focus:border-blue-600 transition text-lg shadow-inner text-slate-800 font-bold placeholder-slate-300">
            </div>

            <button @click="login()" 
                    class="w-full bg-blue-600 text-white py-5 rounded-3xl font-black text-xl shadow-[0_10px_20px_rgba(37,99,235,0.3)] hover:bg-blue-700 hover:shadow-[0_15px_30px_rgba(37,99,235,0.4)] active:scale-95 transition-all mt-4">
                AKSES DASHBOARD
            </button>
        </div>

        <div class="mt-8 text-slate-400 text-[10px] font-bold tracking-widest uppercase">
            © 2026 • Informatics Engineering
        </div>
    </div>

    <script>
        function loginSystem() {
            return {
                username: '',
                password: '',
                login() {
                    // Cek ID dan Password
                    if (this.username === 'admin1' && this.password === 'pnj2026') {
                        // Jika sukses, langsung lemparkan ke file monitoring.html (Dashboard Utama)
                        window.location.href = 'monitoring.html';
                    } else {
                        // Jika gagal, kosongkan password dan beri peringatan
                        this.password = '';
                        alert('Akses Ditolak! Admin ID atau Password salah.');
                    }
                }
            }
        }
    </script>
</body>
</html>

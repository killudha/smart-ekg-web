<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECG Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite@0.0.1-alpha.9/dist/tf-tflite.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body x-data="ecgApp()">
    <template x-if="isLoggedIn">
        <div class="flex">
            <aside class="sidebar">
                <h1 class="text-2xl font-black text-blue-500 italic mb-10">ADMIN_ECG</h1>
                <nav class="space-y-4">
                    <button @click="menu='monitoring'" class="block w-full text-left font-bold text-slate-400 hover:text-white transition">📡 MONITORING</button>
                    <button @click="isLoggedIn=false" class="block w-full text-left font-bold text-red-500 mt-20">LOGOUT</button>
                </nav>
            </aside>

            <main class="main-content">
                <div x-show="menu === 'monitoring'">
                    <div class="card-ecg">
                        <div class="h-64 mb-10 border rounded-2xl overflow-hidden bg-slate-50">
                            <canvas id="ecgChart"></canvas>
                        </div>
                        <div class="grid grid-cols-2 gap-10 text-center">
                            <div class="p-8 bg-blue-600 rounded-[2rem] text-white">
                                <p class="text-xs font-bold uppercase opacity-60">Firebase BPM</p>
                                <p class="text-6xl font-black" x-text="bpm"></p>
                            </div>
                            <div class="p-8 border-4 border-blue-600 rounded-[2rem]">
                                <p class="text-xs font-bold text-slate-400 uppercase">AI Diagnosis</p>
                                <p class="text-4xl font-black text-blue-600 uppercase" x-text="aiResult"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </template>

    <template x-if="!isLoggedIn">
        <div class="min-h-screen flex items-center justify-center bg-slate-900">
            <button @click="login()" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-bold">LOGIN ADMIN</button>
        </div>
    </template>

    <script>
        function ecgApp() {
            return {
                isLoggedIn: false, menu: 'monitoring', bpm: 0, aiResult: '...', tfliteModel: null,
                login() {
                    this.isLoggedIn = true;
                    this.initFirebase();
                    this.loadModel();
                    this.initChart();
                },
                initFirebase() {
                    const config = {
                        apiKey: "AIzaSyD7cegeyQVu5d0cRkv1dyAjzXWOz8gE-HM",
                        authDomain: "smart-ekg-tmj-6b.firebaseapp.com",
                        databaseURL: "https://smart-ekg-tmj-6b-default-rtdb.asia-southeast1.firebasedatabase.app",
                        projectId: "smart-ekg-tmj-6b",
                        storageBucket: "smart-ekg-tmj-6b.firebasestorage.app",
                        messagingSenderId: "257827223094",
                        appId: "1:257827223094:web:e3d4d834e17a77ffcf4a97"
                    };
                    if (!firebase.apps.length) firebase.initializeApp(config);
                    firebase.database().ref('BPM').on('value', (s) => { this.bpm = s.val(); });
                },
                async loadModel() {
                    try {
                        tflite.setWasmPath('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite@0.0.1-alpha.9/dist/');
                        this.tfliteModel = await tflite.loadTFLiteModel('model_ekg_hybrid.tflite');
                        console.log('Model Loaded');
                    } catch (e) { this.aiResult = 'FAIL LOAD'; }
                },
                async runInference(buf) {
                    if (!this.tfliteModel) return;
                    const input = tf.tensor(buf, [1, 375, 1], 'float32');
                    const output = this.tfliteModel.predict(input);
                    const pred = await output.data();
                    const labels = ['NORMAL', 'TAKIKARDIA', 'BRADIKARDIA', 'ARITMIA', 'UNKNOWN'];
                    this.aiResult = labels[pred.indexOf(Math.max(...pred))];
                    input.dispose();
                },
                initChart() {
                    this.$nextTick(() => {
                        const ctx = document.getElementById('ecgChart').getContext('2d');
                        let buf = Array.from({length:375}, () => 0), time = 0;
                        const chart = new Chart(ctx, {
                            type: 'line', data: { labels: Array.from({length:100},(_,i)=>i), datasets: [{ data: Array.from({length:100},()=>0), borderColor: '#2563eb', borderWidth: 2, pointRadius: 0 }] },
                            options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { y: { min: -0.5, max: 2.5 }, x: { display: false } } }
                        });
                        setInterval(() => {
                            if(!this.isLoggedIn) return;
                            time += (this.bpm || 60) / 4500;
                            let p = time % 1.0;
                            let v = (0.15 * Math.exp(-Math.pow(p-0.2,2)/0.002)) + (1.8 * Math.exp(-Math.pow(p-0.4,2)/0.0001)) + (0.25 * Math.exp(-Math.pow(p-0.7,2)/0.005));
                            chart.data.datasets[0].data.shift(); chart.data.datasets[0].data.push(v); chart.update('none');
                            buf.shift(); buf.push(v);
                        }, 30);
                        setInterval(() => { if(this.isLoggedIn && this.tfliteModel) this.runInference(buf); }, 1500);
                    });
                }
            }
        }
    </script>
</body>
</html>

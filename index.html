<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart ECG Dashboard - Pure AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite@0.0.1-alpha.9/dist/tf-tflite.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-blue-50 font-sans" x-data="{ 
    isLoggedIn: false, 
    menu: 'monitoring',
    username: '',
    password: '',
    bpm: 0, 
    aiResult: 'Inisialisasi...',
    tfliteModel: null,

    initFirebase() {
        // --- MASUKKAN DATA FIREBASE KAMU DI SINI ---
        const firebaseConfig = {
            apiKey: 'AIzaSy...', 
            authDomain: 'projek-ekg.firebaseapp.com',
            databaseURL: 'https://projek-ekg-default-rtdb.firebaseio.com', 
            projectId: 'projek-ekg',
            storageBucket: 'projek-ekg.appspot.com',
            messagingSenderId: '...',
            appId: '...'
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        // Langsung dengerin node 'BPM' (Pastikan di Firebase namanya 'BPM')
        firebase.database().ref('BPM').on('value', (snapshot) => {
            const val = snapshot.val();
            if (val !== null) {
                this.bpm = parseInt(val);
                console.log('Firebase Sync:', this.bpm);
            }
        }, (err) => console.error('Firebase Error:', err));
    },

    async loadModel() {
        this.aiResult = 'Memuat AI...';
        try {
            // FIX: Paksa cari mesin WASM ke CDN Google agar tidak Gagal Load di Netlify
            tflite.setWasmPath('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite@0.0.1-alpha.9/dist/');
            
            // Load model dari root (pastikan file model_ekg_hybrid.tflite ada di root GitHub)
            this.tfliteModel = await tflite.loadTFLiteModel('model_ekg_hybrid.tflite');
            this.aiResult = 'Model Aktif';
            console.log('Model TFLite Ready');
        } catch (e) {
            this.aiResult = 'AI Gagal';
            console.error('TFLite Error:', e);
        }
    },

    async runInference(inputData) {
        if (!this.tfliteModel) return;
        try {
            const inputTensor = tf.tensor(inputData, [1, 375, 1], 'float32');
            const output = this.tfliteModel.predict(inputTensor);
            const predictions = await output.data();
            const labels = ['NORMAL', 'TAKIKARDIA', 'BRADIKARDIA', 'ARITMIA', 'UNKNOWN'];
            const maxIdx = predictions.indexOf(Math.max(...predictions));
            this.aiResult = labels[maxIdx];
            inputTensor.dispose();
        } catch (err) { console.error('AI Error:', err); }
    },

    initChart() {
        this.$nextTick(() => {
            const ctx = document.getElementById('ecgChart').getContext('2d');
            if (window.myChart) window.myChart.destroy();
            let buffer = Array.from({length: 375}, () => 0);
            let time = 0;

            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: 100}, (_, i) => i),
                    datasets: [{
                        data: Array.from({length: 100}, () => 0),
                        borderColor: '#2563eb',
                        borderWidth: 3,
                        pointRadius: 0,
                        tension: 0.3,
                        fill: true,
                        backgroundColor: 'rgba(37, 99, 235, 0.05)'
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, animation: false,
                    scales: { y: { min: -0.5, max: 2.5 }, x: { display: false } }
                }
            });

            setInterval(() => {
                if(this.menu === 'monitoring' && this.isLoggedIn) {
                    let speed = (this.bpm > 0 ? this.bpm : 60) / 4500;
                    time += speed;
                    
                    // Grafik Jantung Realistis
                    let p = time % 1.0;
                    let val = (0.12 * Math.exp(-Math.pow(p - 0.2, 2) / 0.002)) + 
                              (1.8 * Math.exp(-Math.pow(p - 0.4, 2) / 0.0001)) + 
                              (0.25 * Math.exp(-Math.pow(p - 0.7, 2) / 0.005));
                    
                    window.myChart.data.datasets[0].data.shift();
                    window.myChart.data.datasets[0].data.push(val);
                    window.myChart.update('none');
                    buffer.shift(); buffer.push(val);
                }
            }, 30);

            setInterval(() => {
                if(this.isLoggedIn && this.tfliteModel && this.menu === 'monitoring') {
                    this.runInference(buffer);
                }
            }, 1000);
        });
    }
}">

    <template x-if="!isLoggedIn">
        <div class="min-h-screen flex items-center justify-center bg-slate-900 px-4">
            <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-md border-t-[12px] border-blue-600">
                <div class="text-center mb-10">
                    <h2 class="text-3xl font-black text-slate-800 uppercase italic">Smart ECG</h2>
                    <p class="text-slate-400 font-bold text-[10px] tracking-widest mt-1">v2.6 FINAL STABLE</p>
                </div>
                <div class="space-y-4">
                    <input type="text" x-model="username" placeholder="Admin ID" class="w-full p-4 bg-slate-50 border-2 rounded-2xl outline-none">
                    <input type="password" x-model="password" placeholder="Password" class="w-full p-4 bg-slate-50 border-2 rounded-2xl outline-none">
                    <button @click="if(username==='admin1' && password==='pnj2026'){isLoggedIn=true; initFirebase(); loadModel(); initChart();} else {alert('Akses Ditolak')}" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-xl hover:bg-blue-700 transition active:scale-95">LOGIN</button>
                </div>
            </div>
        </div>
    </template>

    <template x-if="isLoggedIn">
        <div class="flex min-h-screen">
            <aside class="w-72 bg-slate-900 text-white flex flex-col p-8 shadow-2xl">
                <div class="mb-12">
                    <h1 class="text-2xl font-black italic">ADMIN<span class="text-blue-500">_ECG</span></h1>
                    <div class="h-1 w-12 bg-blue-600 mt-2"></div>
                </div>
                <nav class="flex-1 space-y-4 font-bold text-sm">
                    <button @click="menu='monitoring'; initChart()" :class="menu==='monitoring' ? 'text-blue-500' : 'text-slate-500'">📡 MONITORING</button>
                    <button @click="menu='team'" :class="menu==='team' ? 'text-blue-500' : 'text-slate-500'">👥 TEAM</button>
                </nav>
                <button @click="isLoggedIn=false" class="py-3 text-red-500 font-black border-2 border-red-900/30 rounded-2xl text-xs">LOGOUT</button>
            </aside>

            <main class="flex-1 p-12 bg-white">
                <div x-show="menu === 'monitoring'">
                    <div class="flex justify-between items-end mb-10">
                        <h2 class="text-4xl font-black text-slate-800 tracking-tighter uppercase italic">Live Stream</h2>
                        <span class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-[10px] font-black uppercase">Pure TFLite Active</span>
                    </div>

                    <div class="bg-slate-50 p-10 rounded-[3.5rem] border border-slate-100 shadow-sm">
                        <div class="h-80 bg-white rounded-[2.5rem] mb-10 relative overflow-hidden border-2 shadow-inner">
                            <div class="absolute inset-0 opacity-[0.04]" style="background-image: linear-gradient(#000 1px, transparent 1px), linear-gradient(90deg, #000 1px, transparent 1px); background-size: 25px 25px;"></div>
                            <canvas id="ecgChart" class="relative z-10"></canvas>
                        </div>
                        <div class="grid grid-cols-2 gap-10">
                            <div class="p-10 bg-blue-600 rounded-[3rem] text-white shadow-2xl">
                                <p class="text-[10px] font-black uppercase opacity-60 mb-2 tracking-widest">Realtime BPM (Firebase)</p>
                                <p class="text-7xl font-black" x-text="bpm + ' BPM'"></p>
                            </div>
                            <div class="p-10 bg-white border-[6px] border-blue-600 rounded-[3rem] text-center">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">AI TFLite Result</p>
                                <p class="text-5xl font-black text-blue-600 uppercase" x-text="aiResult"></p>
                            </div>
                        </div>
                    </div>
                </div>

                <div x-show="menu === 'team'">
                    <h2 class="text-3xl font-black text-slate-800 mb-10 text-center uppercase italic">Collaborators</h2>
                    <div class="grid grid-cols-2 gap-6 max-w-4xl mx-auto">
                        <div class="bg-white p-8 rounded-3xl border shadow text-center">
                            <p class="text-xl font-black">Maqrefa Akbar</p><p class="text-blue-500 font-mono text-sm">2307421037</p>
                        </div>
                        <div class="bg-white p-8 rounded-3xl border shadow text-center">
                            <p class="text-xl font-black">Ghea Geltra Ambarwinoto</p><p class="text-blue-500 font-mono text-sm">2307421038</p>
                        </div>
                        <div class="bg-white p-8 rounded-3xl border shadow text-center">
                            <p class="text-xl font-black">Naora Adhani</p><p class="text-blue-500 font-mono text-sm">2307421041</p>
                        </div>
                        <div class="bg-white p-8 rounded-3xl border shadow text-center">
                            <p class="text-xl font-black">Shanazsiva Nasra</p><p class="text-blue-500 font-mono text-sm">2307421044</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </template>
</body>
</html>

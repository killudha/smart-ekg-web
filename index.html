<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart ECG - Pure AI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite@0.0.1-alpha.9/dist/tf-tflite.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-blue-50" x-data="ecgApp()">

    <template x-if="!isLoggedIn">
        <div class="min-h-screen flex items-center justify-center bg-navy">
            <div class="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-md border-t-[12px] border-blue-600">
                <h2 class="text-3xl font-black text-slate-800 text-center uppercase italic italic">Admin Login</h2>
                <div class="mt-8 space-y-4">
                    <input type="text" x-model="username" placeholder="Admin ID" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:border-blue-600">
                    <input type="password" x-model="password" placeholder="Password" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:border-blue-600">
                    <button @click="login()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-xl hover:bg-blue-700 transition">MASUK</button>
                </div>
            </div>
        </div>
    </template>

    <template x-if="isLoggedIn">
        <div class="flex min-h-screen">
            <aside class="w-72 bg-navy text-white flex flex-col p-8">
                <div class="mb-12">
                    <h1 class="text-2xl font-black italic tracking-tighter text-blue-500">SMART_ECG</h1>
                </div>
                <nav class="flex-1 space-y-2 uppercase text-xs tracking-widest">
                    <button @click="menu='monitoring'" :class="menu==='monitoring' ? 'active' : ''" class="sidebar-btn">📡 Monitoring</button>
                    <button @click="menu='team'" :class="menu==='team' ? 'active' : ''" class="sidebar-btn">👥 Team</button>
                </nav>
                <button @click="isLoggedIn=false" class="py-3 text-red-500 font-bold border-2 border-red-900/30 rounded-2xl text-[10px]">LOGOUT</button>
            </aside>

            <main class="flex-1 p-12 bg-white overflow-y-auto">
                <div x-show="menu === 'monitoring'" x-transition>
                    <div class="flex justify-between items-center mb-10">
                        <h2 class="text-4xl font-black text-slate-800 uppercase italic">Live Monitoring</h2>
                        <span class="bg-blue-100 text-blue-600 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest" x-text="aiStatus"></span>
                    </div>

                    <div class="card-glass p-10 border">
                        <div class="h-80 bg-slate-50 rounded-[2rem] mb-10 relative overflow-hidden border shadow-inner">
                            <canvas id="ecgChart" class="relative z-10 w-full h-full"></canvas>
                        </div>
                        <div class="grid grid-cols-2 gap-10">
                            <div class="p-10 bg-blue-600 rounded-[3rem] text-white shadow-2xl">
                                <p class="text-[10px] font-black uppercase tracking-widest opacity-60 mb-2">Realtime BPM (Firebase)</p>
                                <p class="text-7xl font-black" x-text="bpm + ' BPM'"></p>
                            </div>
                            <div class="p-10 bg-white border-[6px] border-blue-600 rounded-[3rem] text-center" :class="aiResult === 'TAKIKARDIA' || aiResult === 'ARITMIA' ? 'danger-alert' : ''">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">TFLite Inference</p>
                                <p class="text-5xl font-black text-blue-600 uppercase" x-text="aiResult"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </template>

    <script>
        function ecgApp() {
            return {
                isLoggedIn: false,
                menu: 'monitoring',
                username: '',
                password: '',
                bpm: 0,
                aiResult: '...',
                aiStatus: 'Loading TFLite...',
                tfliteModel: null,

                login() {
                    if(this.username === 'admin1' && this.password === 'pnj2026') {
                        this.isLoggedIn = true;
                        this.initFirebase();
                        this.loadModel();
                        this.initChart();
                    } else { alert('Gagal!'); }
                },

                initFirebase() {
                    const config = {
                        apiKey: "AIzaSyD7cegeyQVu5d0cRkv1dyAjzXWOz8gE-HM",
                        authDomain: "smart-ekg-tmj-6b.firebaseapp.com",
                        databaseURL: "https://smart-ekg-tmj-6b-default-rtdb.asia-southeast1.firebasedatabase.app",
                        projectId: "smart-ekg-tmj-6b",
                        storageBucket: "smart-ekg-tmj-6b.firebasestorage.app",
                        messagingSenderId: "257827223094",
                        appId: "1:257827223094:web:e3d4d834e17a77ffcf4a97"
                    };
                    if (!firebase.apps.length) firebase.initializeApp(config);
                    firebase.database().ref('BPM').on('value', (s) => {
                        this.bpm = parseInt(s.val()) || 0;
                        console.log('Firebase Update:', this.bpm);
                    });
                },

                async loadModel() {
                    try {
                        // FORCE WASM PATH (Supaya bisa ditarik ke Netlify tanpa error)
                        tflite.setWasmPath('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite@0.0.1-alpha.9/dist/');
                        this.tfliteModel = await tflite.loadTFLiteModel('model_ekg_hybrid.tflite');
                        this.aiStatus = 'Model: model_ekg_hybrid.tflite Active';
                        this.aiResult = 'READY';
                    } catch (e) {
                        this.aiResult = 'FAIL';
                        console.error(e);
                    }
                },

                async runInference(buffer) {
                    if (!this.tfliteModel) return;
                    const input = tf.tensor(buffer, [1, 375, 1], 'float32');
                    const output = this.tfliteModel.predict(input);
                    const pred = await output.data();
                    const labels = ['NORMAL', 'TAKIKARDIA', 'BRADIKARDIA', 'ARITMIA', 'UNKNOWN'];
                    this.aiResult = labels[pred.indexOf(Math.max(...pred))];
                    input.dispose();
                },

                initChart() {
                    this.$nextTick(() => {
                        const ctx = document.getElementById('ecgChart').getContext('2d');
                        let buffer = Array.from({length: 375}, () => 0);
                        let time = 0;
                        const chart = new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: Array.from({length: 100}, (_, i) => i),
                                datasets: [{ data: Array.from({length: 100}, () => 0), borderColor: '#2563eb', borderWidth: 3, pointRadius: 0, fill: true, backgroundColor: 'rgba(37, 99, 235, 0.05)' }]
                            },
                            options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { y: { min: -0.5, max: 2.5 }, x: { display: false } }, plugins: { legend: { display: false } } }
                        });

                        setInterval(() => {
                            if(!this.isLoggedIn) return;
                            time += (this.bpm || 60) / 4500;
                            let p = time % 1.0;
                            let val = (0.15 * Math.exp(-Math.pow(p-0.2,2)/0.002)) + (1.8 * Math.exp(-Math.pow(p-0.4,2)/0.0001)) + (0.25 * Math.exp(-Math.pow(p-0.7,2)/0.005));
                            chart.data.datasets[0].data.shift();
                            chart.data.datasets[0].data.push(val);
                            chart.update('none');
                            buffer.shift(); buffer.push(val);
                        }, 30);

                        setInterval(() => { if(this.isLoggedIn && this.tfliteModel) this.runInference(buffer); }, 1500);
                    });
                }
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart ECG Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-blue-50 font-sans" x-data="{
    isLoggedIn: false,
    menu: 'monitoring',
    username: '',
    password: '',
    bpm: 0,
    aiResult: 'Inisialisasi...',
    tfModel: null,

    initFirebase() {
        const firebaseConfig = {
            apiKey: 'ISI_API_KEY_KAMU',
            authDomain: 'projek-ekg.firebaseapp.com',
            databaseURL: 'https://projek-ekg-default-rtdb.firebaseio.com',
            projectId: 'projek-ekg',
            storageBucket: 'projek-ekg.appspot.com',
            messagingSenderId: 'ISI_SENDER_ID',
            appId: 'ISI_APP_ID'
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        firebase.database().ref('BPM').on('value', (snapshot) => {
            const val = snapshot.val();
            if (val !== null) {
                this.bpm = parseInt(val);
                console.log('Firebase BPM:', this.bpm);
            }
        }, (err) => {
            console.error('Firebase Error:', err);
        });
    },

    async loadModel() {
        this.aiResult = 'Memuat AI...';
        try {
            // Gunakan TensorFlow.js GraphModel (bukan TFLite)
            // Kamu perlu convert .tflite -> tfjs format (lihat catatan di bawah)
            // Untuk sementara, pakai fallback rule-based dari BPM
            this.tfModel = 'rule-based'; // placeholder
            this.aiResult = 'Model Aktif';
            console.log('Mode: Rule-Based AI (dari BPM Firebase)');
        } catch (e) {
            this.aiResult = 'AI Gagal';
            console.error('Model Error:', e);
        }
    },

    runInference() {
        // Rule-based fallback menggunakan BPM dari Firebase
        // Ganti blok ini jika sudah convert model ke format TFJS
        if (this.bpm <= 0) {
            this.aiResult = 'Menunggu Data...';
        } else if (this.bpm > 100) {
            this.aiResult = 'TAKIKARDIA';
        } else if (this.bpm < 60) {
            this.aiResult = 'BRADIKARDIA';
        } else {
            this.aiResult = 'NORMAL';
        }
    },

    initChart() {
        this.$nextTick(() => {
            const ctx = document.getElementById('ecgChart').getContext('2d');
            if (window.myChart) window.myChart.destroy();

            let buffer = Array.from({length: 375}, () => 0);
            let time = 0;

            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: 100}, (_, i) => i),
                    datasets: [{
                        label: '',           // FIX: hilangkan 'undefined' di legend
                        data: Array.from({length: 100}, () => 0),
                        borderColor: '#2563eb',
                        borderWidth: 2.5,
                        pointRadius: 0,
                        tension: 0.3,
                        fill: true,
                        backgroundColor: 'rgba(37, 99, 235, 0.05)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    plugins: {
                        legend: { display: false }  // FIX: sembunyikan legend sepenuhnya
                    },
                    scales: {
                        y: { min: -0.5, max: 2.5 },
                        x: { display: false }
                    }
                }
            });

            // Update grafik setiap 30ms
            setInterval(() => {
                if (this.menu === 'monitoring' && this.isLoggedIn) {
                    let speed = (this.bpm > 0 ? this.bpm : 60) / 4500;
                    time += speed;
                    let p = time % 1.0;
                    let val =
                        (0.12 * Math.exp(-Math.pow(p - 0.2, 2) / 0.002)) +
                        (1.8  * Math.exp(-Math.pow(p - 0.4, 2) / 0.0001)) +
                        (0.25 * Math.exp(-Math.pow(p - 0.7, 2) / 0.005));

                    window.myChart.data.datasets[0].data.shift();
                    window.myChart.data.datasets[0].data.push(val);
                    window.myChart.update('none');
                    buffer.shift();
                    buffer.push(val);
                }
            }, 30);

            // Jalankan inferensi setiap 1 detik
            setInterval(() => {
                if (this.isLoggedIn && this.menu === 'monitoring') {
                    this.runInference();
                }
            }, 1000);
        });
    }
}">

    <!-- LOGIN PAGE -->
    <template x-if="!isLoggedIn">
        <div class="min-h-screen flex items-center justify-center bg-slate-900 px-4">
            <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-md border-t-[12px] border-blue-600">
                <div class="text-center mb-10">
                    <h2 class="text-3xl font-black text-slate-800 uppercase italic">Smart ECG</h2>
                    <p class="text-slate-400 font-bold text-[10px] tracking-widest mt-1">v2.7 NETLIFY STABLE</p>
                </div>
                <div class="space-y-4">
                    <input type="text" x-model="username" placeholder="Admin ID"
                        class="w-full p-4 bg-slate-50 border-2 rounded-2xl outline-none focus:border-blue-500">
                    <input type="password" x-model="password" placeholder="Password"
                        class="w-full p-4 bg-slate-50 border-2 rounded-2xl outline-none focus:border-blue-500">
                    <button @click="
                        if(username==='admin1' && password==='pnj2026'){
                            isLoggedIn=true;
                            initFirebase();
                            loadModel();
                            initChart();
                        } else {
                            alert('Akses Ditolak');
                        }"
                        class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-xl hover:bg-blue-700 transition active:scale-95">
                        LOGIN
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- DASHBOARD -->
    <template x-if="isLoggedIn">
        <div class="flex min-h-screen">

            <!-- SIDEBAR -->
            <aside class="w-72 bg-slate-900 text-white flex flex-col p-8 shadow-2xl">
                <div class="mb-12">
                    <h1 class="text-2xl font-black italic">ADMIN<span class="text-blue-500">_ECG</span></h1>
                    <div class="h-1 w-12 bg-blue-600 mt-2"></div>
                </div>
                <nav class="flex-1 space-y-4 font-bold text-sm flex flex-col">
                    <button @click="menu='monitoring'; initChart()"
                        :class="menu==='monitoring' ? 'text-blue-500 bg-blue-500/10 px-4 py-3 rounded-xl' : 'text-slate-500 px-4 py-3'"
                        class="text-left transition">
                        📡 MONITORING
                    </button>
                    <button @click="menu='team'"
                        :class="menu==='team' ? 'text-blue-500 bg-blue-500/10 px-4 py-3 rounded-xl' : 'text-slate-500 px-4 py-3'"
                        class="text-left transition">
                        👥 TEAM
                    </button>
                </nav>
                <button @click="isLoggedIn=false"
                    class="py-3 text-red-500 font-black border-2 border-red-900/30 rounded-2xl text-xs hover:bg-red-900/10 transition">
                    LOGOUT
                </button>
            </aside>

            <!-- MAIN CONTENT -->
            <main class="flex-1 p-12 bg-white overflow-y-auto">

                <!-- MONITORING -->
                <div x-show="menu === 'monitoring'">
                    <div class="flex justify-between items-end mb-10">
                        <h2 class="text-4xl font-black text-slate-800 tracking-tighter uppercase italic">Live Stream</h2>
                        <span class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-[10px] font-black uppercase">Firebase + AI Active</span>
                    </div>

                    <div class="bg-slate-50 p-10 rounded-[3.5rem] border border-slate-100 shadow-sm">
                        <!-- CHART -->
                        <div class="h-80 bg-white rounded-[2.5rem] mb-10 relative overflow-hidden border-2 border-slate-100 shadow-inner">
                            <div class="absolute inset-0 opacity-[0.04]"
                                style="background-image: linear-gradient(#000 1px, transparent 1px), linear-gradient(90deg, #000 1px, transparent 1px); background-size: 25px 25px;">
                            </div>
                            <canvas id="ecgChart" class="relative z-10 w-full h-full"></canvas>
                        </div>

                        <!-- STATS GRID -->
                        <div class="grid grid-cols-2 gap-10">
                            <!-- BPM CARD -->
                            <div class="p-10 bg-blue-600 rounded-[3rem] text-white shadow-2xl">
                                <p class="text-[10px] font-black uppercase opacity-60 mb-2 tracking-widest">Realtime BPM (Firebase)</p>
                                <p class="text-7xl font-black" x-text="bpm + ' BPM'"></p>
                                <p class="text-xs opacity-50 mt-3 font-bold">
                                    <span x-show="bpm > 0">● Live</span>
                                    <span x-show="bpm <= 0">○ Menunggu koneksi...</span>
                                </p>
                            </div>

                            <!-- AI RESULT CARD -->
                            <div class="p-10 bg-white border-[6px] rounded-[3rem] text-center shadow-sm"
                                :class="{
                                    'border-blue-600': aiResult === 'NORMAL' || aiResult === 'Model Aktif',
                                    'border-red-500': aiResult === 'TAKIKARDIA' || aiResult === 'ARITMIA',
                                    'border-yellow-500': aiResult === 'BRADIKARDIA',
                                    'border-slate-300': aiResult === 'Memuat AI...' || aiResult === 'Menunggu Data...',
                                    'border-red-800': aiResult === 'AI Gagal'
                                }">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">AI Result</p>
                                <p class="text-4xl font-black uppercase"
                                    :class="{
                                        'text-blue-600': aiResult === 'NORMAL' || aiResult === 'Model Aktif',
                                        'text-red-500': aiResult === 'TAKIKARDIA' || aiResult === 'ARITMIA',
                                        'text-yellow-500': aiResult === 'BRADIKARDIA',
                                        'text-slate-400': aiResult === 'Memuat AI...' || aiResult === 'Menunggu Data...',
                                        'text-red-800': aiResult === 'AI Gagal'
                                    }"
                                    x-text="aiResult">
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- TEAM -->
                <div x-show="menu === 'team'">
                    <h2 class="text-3xl font-black text-slate-800 mb-10 text-center uppercase italic">Collaborators</h2>
                    <div class="grid grid-cols-2 gap-6 max-w-4xl mx-auto">
                        <div class="bg-white p-8 rounded-3xl border shadow text-center hover:shadow-md transition">
                            <p class="text-xl font-black">Maqrefa Akbar</p>
                            <p class="text-blue-500 font-mono text-sm">2307421037</p>
                        </div>
                        <div class="bg-white p-8 rounded-3xl border shadow text-center hover:shadow-md transition">
                            <p class="text-xl font-black">Ghea Geltra Ambarwinoto</p>
                            <p class="text-blue-500 font-mono text-sm">2307421038</p>
                        </div>
                        <div class="bg-white p-8 rounded-3xl border shadow text-center hover:shadow-md transition">
                            <p class="text-xl font-black">Naora Adhani</p>
                            <p class="text-blue-500 font-mono text-sm">2307421041</p>
                        </div>
                        <div class="bg-white p-8 rounded-3xl border shadow text-center hover:shadow-md transition">
                            <p class="text-xl font-black">Shanazsiva Nasra</p>
                            <p class="text-blue-500 font-mono text-sm">2307421044</p>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </template>
</body>
</html>

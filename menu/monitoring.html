<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring - Smart ECG</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --navy: #020617; --blue-accent: #3b82f6; }
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; padding: 2rem; }
        .main-content { width: 100%; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 30px; padding: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .danger-anim { border: 4px solid #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 
            0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 
            70% { box-shadow: 0 0 0 20px rgba(239,68,68,0); } 
            100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); } 
        }
        .modal-bg { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
    </style>
</head>

<body x-data="ecgEngine()" class="relative">

<main class="main-content" :class="showModal ? 'filter blur-sm' : ''">
    <div class="flex justify-between items-end mb-6">
        <div>
            <h1 class="text-4xl font-black uppercase italic tracking-tighter text-slate-900">Monitor EKG Real-Time</h1>
            <div class="mt-4 flex gap-3">
                <span class="bg-blue-100 text-blue-800 px-4 py-2 rounded-full text-sm font-bold shadow-sm" x-text="modelStatus"></span>
                <span class="bg-green-100 text-green-800 px-4 py-2 rounded-full text-sm font-bold shadow-sm">
                    Firebase: <span x-text="firebaseStatus"></span>
                </span>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <button @click="toggleAnalysis()" 
                    class="px-6 py-3 rounded-full font-black text-sm uppercase tracking-widest shadow-lg transition-all"
                    :class="isAnalyzing ? 'bg-red-500 hover:bg-red-600 text-white animate-pulse' : 'bg-blue-600 hover:bg-blue-700 text-white'">
                <span x-text="isAnalyzing ? '⏹ HENTIKAN AI' : '▶ MULAI ANALISIS AI'"></span>
            </button>
            <div class="bg-white rounded-full px-6 py-4 shadow font-bold text-slate-500 flex items-center gap-3 border border-slate-100">
                <div class="w-3 h-3 rounded-full" :class="bpm > 0 ? 'bg-green-500 animate-ping' : 'bg-slate-300'"></div>
                BPM: <span x-text="bpm" class="text-slate-800"></span>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-3xl p-5 mb-6 shadow flex flex-wrap gap-8 items-center border border-slate-100">
        <div class="flex items-center gap-3">
            <label class="text-xs font-black text-slate-400 uppercase tracking-widest">Durasi Rekam (Detik):</label>
            <input type="number" x-model.number="settingRecordLimit" class="bg-slate-50 border border-slate-200 rounded-lg px-3 py-1 w-20 text-center font-bold outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="w-px h-8 bg-slate-200 hidden md:block"></div>
        <div class="flex items-center gap-3">
            <label class="text-xs font-black text-slate-400 uppercase tracking-widest">Interval Analisis AI:</label>
            <select x-model.number="settingInferenceMs" class="bg-slate-50 border border-slate-200 rounded-lg px-3 py-1 font-bold outline-none focus:ring-2 focus:ring-blue-500">
                <option value="1000">1 Detik</option>
                <option value="1500">1.5 Detik</option>
                <option value="2500">2.5 Detik</option>
            </select>
        </div>
        <div class="w-px h-8 bg-slate-200 hidden md:block"></div>
        <div class="flex items-center gap-3">
            <label class="text-xs font-black text-slate-400 uppercase tracking-widest" title="Semakin besar, AI makin stabil tapi lambat merespon perubahan">Kestabilan AI (Voting):</label>
            <input type="number" x-model.number="settingVotingSize" min="1" max="10" class="bg-slate-50 border border-slate-200 rounded-lg px-3 py-1 w-16 text-center font-bold outline-none focus:ring-2 focus:ring-blue-500">
        </div>
    </div>

    <div class="card mb-10 border border-slate-100">
        <div class="bg-slate-950 rounded-3xl p-6 relative overflow-hidden h-[350px]">
            <div class="absolute inset-0 opacity-10" style="background-image: linear-gradient(#00ff99 1px, transparent 1px), linear-gradient(90deg, #00ff99 1px, transparent 1px); background-size: 40px 40px;"></div>
            
            <canvas id="ecgCanvas" class="w-full h-full relative z-10 block"></canvas>
            
            <div x-show="isRecording" class="absolute top-6 right-6 bg-red-600 text-white px-4 py-2 rounded-full font-bold text-xs uppercase tracking-widest animate-pulse z-20 flex items-center gap-2">
                <div class="w-2 h-2 bg-white rounded-full"></div> Merekam... <span x-text="recordTimer"></span>s
            </div>
        </div>
        <div class="mt-4 flex justify-between items-center text-xs font-black uppercase tracking-widest">
            <div class="flex gap-3">
                <button @click="startRecording()" x-show="!isRecording && !hasRecordedData" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-lg shadow transition-colors">
                    Mulai Rekam
                </button>
                <button @click="stopRecording()" x-show="isRecording" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-lg shadow transition-colors">
                    Hentikan Rekam
                </button>
                <button @click="openModal()" x-show="hasRecordedData" class="bg-slate-800 hover:bg-slate-900 text-white px-6 py-2 rounded-lg shadow transition-colors">
                    Simpan ke History
                </button>
                <button @click="resetRecording()" x-show="hasRecordedData" class="bg-slate-200 hover:bg-slate-300 text-slate-600 px-6 py-2 rounded-lg transition-colors">
                    Hapus Rekaman
                </button>
            </div>
            <div class="text-slate-400">
                Voltase Sensor: <span id="voltValue" class="text-slate-900 ml-1">0.00</span>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-8">
        <div class="card bg-gradient-to-br from-blue-600 to-blue-800 text-white shadow-xl relative overflow-hidden">
            <div class="absolute -right-8 -top-8 text-white opacity-10 text-[15rem] leading-none select-none">❤</div>
            <p class="text-sm mb-4 font-black tracking-[0.3em] uppercase opacity-70 text-blue-100">Heart Rate Avg</p>
            <h1 class="text-8xl font-black flex items-baseline gap-4 relative z-10 italic">
                <span x-text="bpm"></span><span class="text-3xl opacity-60 font-normal italic">BPM</span>
            </h1>
        </div>

        <div class="card transition-all duration-500 shadow-xl"
             :class="{
                'danger-anim bg-red-50': aiLabel === 'ARITMIA' || aiLabel === 'TAKIKARDIA',
                'border-4 border-yellow-400 bg-yellow-50': aiLabel === 'BRADIKARDIA',
                'border-4 border-blue-600 bg-white': aiLabel === 'NORMAL' || aiLabel === 'ANALISIS JEDA',
                'border-4 border-red-900 bg-red-100': aiLabel.includes('ERR')
             }">
            <div class="flex justify-between mb-6 items-center">
                <h1 class="font-black text-slate-400 tracking-[0.4em] uppercase text-[10px]">1D-CNN (Smart Filter)</h1>
                <div class="bg-slate-900 text-white px-4 py-1.5 rounded-full text-[10px] font-black shadow-lg">
                    <span x-text="confidence"></span>% CONFIDENCE
                </div>
            </div>
            <div class="text-center py-4">
                <h1 class="text-5xl font-black mb-6 italic tracking-tighter uppercase"
                    :class="{
                        'text-red-600': aiLabel === 'ARITMIA' || aiLabel === 'TAKIKARDIA',
                        'text-yellow-600': aiLabel === 'BRADIKARDIA',
                        'text-blue-600': aiLabel === 'NORMAL',
                        'text-red-900': aiLabel.includes('ERR'),
                        'text-slate-300': aiLabel.includes('WAIT') || aiLabel.includes('GATHER') || aiLabel.includes('JEDA')
                    }" x-text="aiLabel">
                </h1>
                <div class="inline-block bg-slate-100 text-slate-500 px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest">
                    Data Window: <span id="dataWindow">0</span> / 375
                </div>
            </div>
        </div>
    </div>
</main>

<div x-show="showModal" class="fixed inset-0 z-50 flex items-center justify-center modal-bg" style="display: none;">
    <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl transform transition-all">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black text-slate-800">Profil & Simpan</h2>
            <button @click="closeModal()" class="text-slate-400 hover:text-red-500 font-bold text-xl">&times;</button>
        </div>
        
        <form @submit.prevent="saveToFirebase()" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-slate-500 mb-1">Nama Pasien</label>
                <input type="text" x-model="form.nama" required class="w-full border border-slate-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-slate-500 mb-1">Umur</label>
                    <input type="number" x-model="form.umur" required class="w-full border border-slate-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-500 mb-1">Jenis Kelamin</label>
                    <select x-model="form.gender" class="w-full border border-slate-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">
                        <option>Laki-laki</option>
                        <option>Perempuan</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-slate-500 mb-1">Tinggi Badan (cm)</label>
                    <input type="number" x-model="form.tb" required class="w-full border border-slate-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-500 mb-1">Berat Badan (kg)</label>
                    <input type="number" x-model="form.bb" required class="w-full border border-slate-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>
            <div class="mt-8">
                <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-lg shadow-lg transition-colors">
                    Simpan Riwayat EKG
                </button>
            </div>
        </form>
    </div>
</div>

<script>
// =========================================================================
// VARIABEL GLOBAL & PURE CANVAS (GARANSI 100% BEBAS LAG!)
// =========================================================================
let globalTfModel = null; 
let globalDataBuffer = []; 
let globalIncomingQueue = [];
let globalRecordedData = [];
let predictionHistory = []; 

// Buffer khusus untuk menggambar garis Canvas
let ecgDrawBuffer = new Array(250).fill(715); 
let canvasCtx = null;
let canvasElement = null;

function initPureCanvas() {
    canvasElement = document.getElementById('ecgCanvas');
    if (!canvasElement) return;
    
    // Sesuaikan resolusi internal canvas dengan ukuran tampilannya
    canvasElement.width = canvasElement.clientWidth;
    canvasElement.height = canvasElement.clientHeight;
    canvasCtx = canvasElement.getContext('2d');
    
    // Mulai animasi 60 FPS
    requestAnimationFrame(renderCanvasFrame);
}

function renderCanvasFrame() {
    if (!canvasCtx || !canvasElement) return;

    const width = canvasElement.width;
    const height = canvasElement.height;

    // Bersihkan frame sebelumnya
    canvasCtx.clearRect(0, 0, width, height);

    // Styling garis EKG
    canvasCtx.strokeStyle = '#00ff99';
    canvasCtx.lineWidth = 2.5;
    canvasCtx.lineJoin = 'round';
    canvasCtx.beginPath();

    const xStep = width / (ecgDrawBuffer.length - 1);
    
    for(let i = 0; i < ecgDrawBuffer.length; i++) {
        const x = i * xStep;
        // Mapping voltase EKG (400 - 1100) ke tinggi canvas
        let val = ecgDrawBuffer[i];
        if (val < 400) val = 400;
        if (val > 1100) val = 1100;
        
        const y = height - ((val - 400) / (1100 - 400)) * height;
        
        if(i === 0) canvasCtx.moveTo(x, y);
        else canvasCtx.lineTo(x, y);
    }
    
    canvasCtx.stroke();
    
    // Panggil ulang untuk frame berikutnya
    requestAnimationFrame(renderCanvasFrame);
}


function ecgEngine() {
    return {
        bpm: 0,
        isAnalyzing: false, 
        aiLabel: 'LOADING AI...',
        confidence: 0,
        modelStatus: 'INIT...',
        firebaseStatus: 'OFFLINE',
        
        // PENGATURAN USER
        settingRecordLimit: 10, 
        settingInferenceMs: 1500, 
        settingVotingSize: 5, // Filter Kestabilan AI
        
        isRecording: false,
        hasRecordedData: false,
        recordTimer: 0,
        recordInterval: null,
        finalAiLabel: '',
        
        showModal: false,
        form: { nama: '', umur: '', tb: '', bb: '', gender: 'Laki-laki' },

        init() {
            initPureCanvas(); // Inisiasi grafik bebas lag
            this.processIncomingData(); // Pengganti interval Chart.js
            this.initFirebase();
            this.loadModel();
            this.runInferenceLoop(); 
        },

        toggleAnalysis() {
            this.isAnalyzing = !this.isAnalyzing;
            if (!this.isAnalyzing) {
                this.aiLabel = 'ANALISIS JEDA';
                this.confidence = 0;
                predictionHistory = []; 
            }
        },

        startRecording() {
            globalRecordedData = [];
            this.hasRecordedData = false;
            this.isRecording = true;
            this.recordTimer = 0;
            
            this.recordInterval = setInterval(() => { 
                this.recordTimer++; 
                if(this.settingRecordLimit > 0 && this.recordTimer >= this.settingRecordLimit) {
                    this.stopRecording();
                }
            }, 1000);
        },

        stopRecording() {
            if(!this.isRecording) return;
            this.isRecording = false;
            clearInterval(this.recordInterval);
            this.hasRecordedData = true;
            this.finalAiLabel = this.aiLabel; 
        },

        resetRecording() {
            globalRecordedData = [];
            this.hasRecordedData = false;
            this.recordTimer = 0;
            this.finalAiLabel = '';
        },

        openModal() { this.showModal = true; },
        closeModal() { this.showModal = false; },

        saveToFirebase() {
            if (globalRecordedData.length === 0) return;
            const dbRef = firebase.database().ref('riwayat_ekg');
            const newRecord = dbRef.push();
            newRecord.set({
                timestamp: new Date().toISOString(),
                profil: this.form,
                bpm_rata_rata: this.bpm,
                indikasi_ai: this.finalAiLabel,
                data_grafik: JSON.stringify(globalRecordedData)
            }).then(() => {
                alert('Riwayat EKG Berhasil Disimpan!');
                this.closeModal();
                this.resetRecording();
                this.form = { nama: '', umur: '', tb: '', bb: '', gender: 'Laki-laki' };
            }).catch((error) => {
                alert('Gagal menyimpan: ' + error.message);
            });
        },

        initFirebase() {
            const config = {
                apiKey: "AIzaSyD7cegeyQVu5d0cRkv1dyAjzXWOz8gE-HM",
                authDomain: "smart-ekg-tmj-6b.firebaseapp.com",
                databaseURL: "https://smart-ekg-tmj-6b-default-rtdb.asia-southeast1.firebasedatabase.app",
                projectId: "smart-ekg-tmj-6b"
            };

            try {
                if (!firebase.apps.length) firebase.initializeApp(config);
                this.firebaseStatus = 'LIVE';
                const dbRef = firebase.database().ref('monitoring/live_data');

                dbRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (!data) return;

                    if (data.bpm !== undefined) this.bpm = parseInt(data.bpm);

                    if (data.graph_value) {
                        let raw = data.graph_value;
                        let newPoints = [];
                        if (typeof raw === 'string') try { raw = JSON.parse(raw); } catch(e) {}
                        if (typeof raw === 'object' && !Array.isArray(raw)) {
                            newPoints = Object.keys(raw).sort((a,b)=>parseInt(a)-parseInt(b)).map(k=>parseFloat(raw[k]));
                        } else if (Array.isArray(raw)) {
                            newPoints = raw.map(v => parseFloat(v));
                        }
                        
                        newPoints = newPoints.filter(v => !isNaN(v));
                        if (newPoints.length > 0) globalIncomingQueue.push(...newPoints);
                    }
                });
            } catch(e) {
                console.error(e);
                this.firebaseStatus = 'FAIL';
            }
        },

        async loadModel() {
            try {
                this.modelStatus = 'SETTING UP...';
                await tf.ready(); 
                this.modelStatus = 'LOADING MODEL...';
                globalTfModel = await tf.loadGraphModel('../tfjs_model/model.json');
                this.modelStatus = 'MODEL ACTIVE';
                this.aiLabel = 'ANALISIS JEDA';
            } catch(e) {
                this.modelStatus = 'MODEL ERROR';
                this.aiLabel = 'GAGAL LOAD';
            }
        },

        runInferenceLoop() {
            this.executeAI().then(() => {
                setTimeout(() => { this.runInferenceLoop(); }, this.settingInferenceMs);
            });
        },

        async executeAI() {
            if (!this.isAnalyzing) {
                this.aiLabel = 'ANALISIS JEDA';
                return;
            }
            if (globalDataBuffer.length < 375) {
                this.aiLabel = 'GATHERING DATA...';
                return;
            }
            if (!globalTfModel) return;

            try {
                const raw375 = globalDataBuffer.slice(-375);
                let minVal = Math.min(...raw375);
                let maxVal = Math.max(...raw375);
                
                const floatArray = new Float32Array(375);
                for(let i = 0; i < 375; i++) {
                    let v = raw375[i];
                    if (isNaN(v) || v == null) v = 0; 
                    floatArray[i] = (maxVal - minVal === 0) ? 0 : (v - minVal) / (maxVal - minVal);
                }

                const result = tf.tidy(() => {
                    const inputTensor = tf.tensor3d(floatArray, [1, 375, 1], 'float32');
                    const output = globalTfModel.predict(inputTensor);
                    
                    let predsTensor = Array.isArray(output) ? output[0] : (output instanceof tf.Tensor ? output : output[Object.keys(output)[0]]);
                    const predsArr = Array.from(predsTensor.dataSync());
                    const score = Math.max(...predsArr);
                    const idx = predsArr.indexOf(score);
                    return { maxIdx: idx, maxScore: score };
                });

                const labels = ['NORMAL', 'TAKIKARDIA', 'BRADIKARDIA', 'ARITMIA'];
                let currentPrediction = labels[result.maxIdx] || 'UNKNOWN';
                
                // ========================================================
                // MAJORITY VOTING (Tingkat Kestabilan AI bisa diset User)
                // ========================================================
                predictionHistory.push(currentPrediction);
                
                // Batasi array memori sesuai input dari pengguna
                if(predictionHistory.length > this.settingVotingSize) {
                    predictionHistory.shift(); 
                }

                let counts = {};
                let finalStabilizedLabel = predictionHistory[0];
                let maxCount = 0;
                for (let lbl of predictionHistory) {
                    counts[lbl] = (counts[lbl] || 0) + 1;
                    if (counts[lbl] > maxCount) { maxCount = counts[lbl]; finalStabilizedLabel = lbl; }
                }

                this.aiLabel = finalStabilizedLabel;
                this.confidence = Math.round(result.maxScore * 100);

            } catch(e) {
                console.error(e);
                this.aiLabel = 'ERR INFERENSI';
                this.confidence = 0;
                this.isAnalyzing = false;
            }
        },

        processIncomingData() {
            const voltDisplay = document.getElementById('voltValue');
            const dataWindowDisplay = document.getElementById('dataWindow');

            setInterval(() => {
                if (globalIncomingQueue.length > 0) {
                    let pointsToProcess = Math.min(globalIncomingQueue.length, 5);
                    let lastVal = 0;

                    for(let i = 0; i < pointsToProcess; i++) {
                        const val = globalIncomingQueue.shift();
                        lastVal = val;
                        
                        // Push ke array untuk digambar di Pure Canvas
                        ecgDrawBuffer.shift();
                        ecgDrawBuffer.push(val);
                        
                        // Push ke memori otak AI
                        globalDataBuffer.push(val);
                        if (globalDataBuffer.length > 375) globalDataBuffer.shift();

                        if (this.isRecording) {
                            globalRecordedData.push(val);
                        }
                    }
                    
                    // Update teks tanpa memicu render Alpine yang berat
                    if(voltDisplay) voltDisplay.innerText = lastVal.toFixed(2);
                    if(dataWindowDisplay) dataWindowDisplay.innerText = globalDataBuffer.length;
                }
            }, 30); // Pengolahan data setiap 30ms, sangat ringan!
        }
    };
}
</script>
</body>
</html>
